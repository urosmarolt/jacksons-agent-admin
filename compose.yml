services:
  jacksons-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jacksons-admin-frontend
    ports:
      - "3003:3003"
    volumes:
      - ./client:/app/client
      - ./vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    env_file:
      - .env
    restart: unless-stopped
